<div class=" ms-4 flex items-center gap-6">
  <div class="ms-auto flex items-center">
    <a [routerLink]="['/create-post']" class="bg-blue-500 text-white
      px-4 py-2 rounded active:scale-95 hover:cursor-pointer">
      Create Post
    </a>
  </div>

  <div class="relative">
    <a (click)="navBarService.toggleNavBarMenu()" class="bg-neutral-200 rounded-full p-3 border cursor-pointer block">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
    </a>


    <!-- menu -->
    <ul class="min-w-50 absolute right-0 top-14
      bg-neutral-50 border rounded"
      [class]="navBarService.hideUserMenu() ? 'hidden' : ''">

      <li class="px-4 py-2 hover:bg-neutral-200 active:scale-95">
        <a [routerLink]="['/dashboard']" (click)="navBarService.toggleNavBarMenu()" class="flex ">
          <span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
        </span>
          <span class="ms-2">Dashboard</span>
        </a>
      </li>

      <li class="px-4 py-2 hover:bg-neutral-200 active:scale-95">
        <a (click)="navBarService.toggleNavBarMenu()" class="flex ">
          <span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
            </svg>
          </span>
          <span class="ms-2">Logout</span>
        </a>
      </li>
    </ul>
  </div>
</div>
