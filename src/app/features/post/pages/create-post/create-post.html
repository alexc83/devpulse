<div class="max-w-7xl mx-auto px-4">
  <h1 class="text-3xl mt-8 mb-4 font-extrabold">Create Post</h1>

  <div class="mt-4">
    <label for="title" class="w-full">Title</label>
    <input
      type="text"
      class="bg-neutral-100 w-full px-4 py-2 mt-2"
      placeholder="Enter a title for your post"
      autocomplete="off"
    />
  </div>

  <div class="mt-4">
    <label for="content" class="w-full">Content</label>
    <textarea
      id="content"
      class="bg-neutral-100 w-full px-4 py-2 mt-2 mb-2 h-50"
      placeholder="Enter blog post content..."
    ></textarea>
  </div>
  <app-button buttonText="Submit" buttonType="submit"></app-button>
  <div class="mt-4"></div>
</div>
